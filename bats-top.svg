<svg xmlns="http://www.w3.org/2000/svg" width="80" height="54" viewBox="0 0 80 54">
  <style>
    .wl{transform-origin:28px 28px;animation:fl .5s ease-in-out infinite alternate}
    .wr{transform-origin:52px 28px;animation:fr .5s ease-in-out infinite alternate}
    .bd{transform-origin:40px 28px;animation:bk .5s ease-in-out infinite alternate}
    @keyframes fl{from{transform:rotate(-12deg)}to{transform:rotate(32deg)}}
    @keyframes fr{from{transform:rotate(12deg)}to{transform:rotate(-32deg)}}
    @keyframes bk{from{transform:translateY(0)}to{transform:translateY(3px)}}
  </style>
  <g class="wl" fill="#378ADD">
    <polygon points="28,28 8,12 15,28"/>
    <polygon points="15,28 4,20 12,32"/>
  </g>
  <g class="wr" fill="#378ADD">
    <polygon points="52,28 72,12 65,28"/>
    <polygon points="65,28 76,20 68,32"/>
  </g>
  <g class="bd" fill="#378ADD">
    <ellipse cx="40" cy="30" rx="9" ry="7"/>
    <ellipse cx="40" cy="21" rx="6" ry="5"/>
    <polygon points="35,18 32,10 38,17"/>
    <polygon points="45,18 48,10 42,17"/>
    <circle cx="37.5" cy="20" r="1.3" fill="#0C447C"/>
    <circle cx="42.5" cy="20" r="1.3" fill="#0C447C"/>
  </g>
</svg>
