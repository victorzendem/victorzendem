<svg xmlns="http://www.w3.org/2000/svg" width="180" height="54" viewBox="0 0 180 54">
  <style>
    .b{fill:#378ADD}
    .w1l{transform-origin:36px 27px;animation:fl .45s ease-in-out infinite alternate}
    .w1r{transform-origin:54px 27px;animation:fr .45s ease-in-out infinite alternate}
    .bd1{transform-origin:45px 27px;animation:bk .45s ease-in-out infinite alternate}
    .w2l{transform-origin:90px 27px;animation:fl .45s .18s ease-in-out infinite alternate}
    .w2r{transform-origin:110px 27px;animation:fr .45s .18s ease-in-out infinite alternate}
    .bd2{transform-origin:100px 27px;animation:bk .45s .18s ease-in-out infinite alternate}
    .w3l{transform-origin:144px 27px;animation:fl .45s .36s ease-in-out infinite alternate}
    .w3r{transform-origin:162px 27px;animation:fr .45s .36s ease-in-out infinite alternate}
    .bd3{transform-origin:153px 27px;animation:bk .45s .36s ease-in-out infinite alternate}
    @keyframes fl{from{transform:rotate(-10deg)}to{transform:rotate(28deg)}}
    @keyframes fr{from{transform:rotate(10deg)}to{transform:rotate(-28deg)}}
    @keyframes bk{from{transform:translateY(0)}to{transform:translateY(2px)}}
  </style>
  <g class="w1l b"><polygon points="36,27 22,18 27,27"/><polygon points="27,27 18,22 24,31"/></g>
  <g class="w1r b"><polygon points="54,27 68,18 63,27"/><polygon points="63,27 72,22 66,31"/></g>
  <g class="bd1 b">
    <ellipse cx="45" cy="28" rx="7" ry="5"/><ellipse cx="45" cy="22" rx="4" ry="3.5"/>
    <polygon points="42,20 40,15 44,19"/><polygon points="48,20 50,15 46,19"/>
    <circle cx="43.2" cy="21" r="1" fill="#0C447C"/><circle cx="46.8" cy="21" r="1" fill="#0C447C"/>
  </g>
  <g class="w2l b"><polygon points="90,27 76,18 81,27"/><polygon points="81,27 72,22 78,31"/></g>
  <g class="w2r b"><polygon points="110,27 124,18 119,27"/><polygon points="119,27 128,22 122,31"/></g>
  <g class="bd2 b">
    <ellipse cx="100" cy="28" rx="7" ry="5"/><ellipse cx="100" cy="22" rx="4" ry="3.5"/>
    <polygon points="97,20 95,15 99,19"/><polygon points="103,20 105,15 101,19"/>
    <circle cx="98.2" cy="21" r="1" fill="#0C447C"/><circle cx="101.8" cy="21" r="1" fill="#0C447C"/>
  </g>
  <g class="w3l b"><polygon points="144,27 130,18 135,27"/><polygon points="135,27 126,22 132,31"/></g>
  <g class="w3r b"><polygon points="162,27 176,18 171,27"/><polygon points="171,27 180,22 174,31"/></g>
  <g class="bd3 b">
    <ellipse cx="153" cy="28" rx="7" ry="5"/><ellipse cx="153" cy="22" rx="4" ry="3.5"/>
    <polygon points="150,20 148,15 152,19"/><polygon points="156,20 158,15 154,19"/>
    <circle cx="151.2" cy="21" r="1" fill="#0C447C"/><circle cx="154.8" cy="21" r="1" fill="#0C447C"/>
  </g>
</svg>
